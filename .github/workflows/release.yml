name: Release APK

on:
  push:
    tags: ['v*']
    branches: ['release/**']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Refresh Gradle wrapper
        run: |
          curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.6/bin/gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            echo "tag=${GITHUB_REF#refs/heads/release/}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag (branch-triggered release)
        if: startsWith(github.ref, 'refs/heads/release/')
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git tag ${{ steps.tag.outputs.tag }} HEAD || true
          git push origin ${{ steps.tag.outputs.tag }} || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Portal HA Bridge — ImmichFrame Edition ${{ steps.tag.outputs.tag }}"
          generate_release_notes: true
