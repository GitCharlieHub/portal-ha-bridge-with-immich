name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, 'codex/**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Refresh Gradle wrapper
        run: |
          curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.6/bin/gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Test and build debug APK
        id: test_build
        continue-on-error: true
        run: |
          set +e
          ./gradlew testDebugUnitTest assembleDebug --no-daemon 2>&1 | tee build.log
          echo "status=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Fail if test/build failed
        if: steps.test_build.outputs.status != '0'
        run: exit 1

      - name: Android lint
        continue-on-error: true
        run: ./gradlew lintDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: portal-ha-bridge-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
