name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main, 'claude/**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Refresh Gradle wrapper
        run: |
          curl -sLo /tmp/gradle.zip https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.6/bin/gradle wrapper --gradle-version 8.6 --distribution-type bin
          chmod +x gradlew

      - name: Test and build debug APK
        run: ./gradlew testDebugUnitTest assembleDebug --no-daemon

      # Upstream currently has two MissingPermission findings in privileged
      # Portal-only paths. Keep lint visible without withholding a tested APK.
      - name: Android lint (diagnostic)
        continue-on-error: true
        run: ./gradlew lintDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: portal-ha-bridge-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
